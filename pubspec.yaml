name: ciphertask
description: A secure, encrypted todo app with Firebase auth.
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Crypto / Encryption
  pointycastle: ^3.7.4
  encrypt: ^5.0.3
  crypto: ^3.0.3

  # Biometrics
  local_auth: ^2.3.0

  # Firebase / Google Auth
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1

  # Email (HTTP-based EmailJS)
  http: ^1.2.1

  # Preferences (theme)
  shared_preferences: ^2.2.3

  # Screen Protection
  screen_protector: ^1.4.0

  # UI / Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  gap: ^3.0.1

  vibration: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
